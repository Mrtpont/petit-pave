  <path d="M0,772 Q60,758 120,772 T240,772 T360,772 T480,772 T600,772 T720,772 T840,772 T960,772 T1080,772 L1120,772 L1120,860 L0,860 Z" fill="#3f6ea5" opacity="0.25"/>
