    <circle cx="682" cy="24" r="6"/>
    <rect x="679" y="30" width="6" height="22"/>
    <polygon points="662,110 702,110 692,52 672,52"/>
    <!-- tour carree -->
    <rect x="650" y="110" width="64" height="150"/>
