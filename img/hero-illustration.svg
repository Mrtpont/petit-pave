<svg viewBox="0 0 1120 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration de Marseille : la colline de Notre-Dame de la Garde au coucher du soleil">
  <defs>
    <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fb3dd"/>
      <stop offset="1" stop-color="#1c4a80"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbcd7a"/>
      <stop offset="1" stop-color="#f5ab3f"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bcd7ef" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5c8fc9" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- soleil -->
  <circle cx="560" cy="235" r="72" fill="url(#sunGrad)"/>

  <!-- nuages -->
  <g fill="#e2ecf9" opacity="0.9">
