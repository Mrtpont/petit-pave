<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Espace admin — Le petit pavé marseillais</title>
<link rel="icon" href="img/logo-mark.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  body { background: var(--surface-subtle); }
  .admin-wrap { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .admin-header a.logo { font-size: 1rem; }
  .admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--shadow-card); padding: 28px; }
  .admin-card h1 { font-size: 1.15rem; margin-bottom: 6px; }
  .admin-card .sub { color: var(--text-tertiary); font-size: 0.88rem; margin-bottom: 22px; }
  .admin-field { margin-bottom: 16px; }
  .admin-field label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; }
  .admin-field input {
    width: 100%; padding: 11px 13px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 0.95rem; background: var(--surface);
  }
  .admin-error { color: #b91c1c; font-size: 0.85rem; margin: 10px 0 0; min-height: 1.2em; }
  .admin-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 10px; flex-wrap: wrap; }
  .admin-panel-header h1 { font-size: 1.15rem; margin: 0; }
  .admin-toolbar { display: flex; gap: 8px; }
  .report-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    box-shadow: var(--shadow-card); padding: 16px; margin-bottom: 14px; display: flex; gap: 14px; flex-wrap: wrap;
  }
  .report-row img { width: 90px; height: 90px; object-fit: cover; border-radius: var(--radius-sm); flex-shrink: 0; }
  .report-fields { flex: 1; min-width: 220px; display: flex; flex-direction: column; gap: 8px; }
  .report-fields select, .report-fields textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 0.9rem; background: var(--surface);
  }
  .report-fields textarea { resize: vertical; min-height: 44px; }
  .report-meta { font-size: 0.78rem; color: var(--text-tertiary); }
  .report-actions { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }
  .admin-empty { text-align: center; color: var(--text-tertiary); padding: 40px 0; }
  [hidden] { display: none !important; }
</style>
</head>
<body>

<div class="admin-wrap">
  <div class="admin-header">
    <a href="index.html" class="logo"><img src="img/logo-mark.svg" alt="" class="logo-mark" width="28" height="25">Le petit pavé <span>marseillais</span></a>
    <a href="index.html" class="footer-admin-link">← Retour au site</a>
  </div>

  <div id="login-view" class="admin-card">
    <h1>Espace admin</h1>
    <p class="sub">Connectez-vous pour modérer les signalements (modifier ou supprimer).</p>
    <form id="login-form">
      <div class="admin-field">
        <label for="login-user">Identifiant</label>
        <input type="text" id="login-user" autocomplete="username" required>
      </div>
      <div class="admin-field">
        <label for="login-pass">Mot de passe</label>
        <input type="password" id="login-pass" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
      <p class="admin-error" id="login-error"></p>
    </form>
  </div>

  <div id="panel-view" hidden>
    <div class="admin-panel-header">
      <h1>Modération des signalements</h1>
      <div class="admin-toolbar">
        <button class="btn btn-ghost btn-sm" id="admin-refresh">🔄 Actualiser</button>
        <button class="btn btn-ghost btn-sm" id="admin-logout">Se déconnecter</button>
      </div>
    </div>
    <div id="reports-list"></div>
  </div>
</div>

<script>
const CATEGORIES = [
  { id: 'voirie', label: 'Voirie', emoji: '🕳️' },
  { id: 'dechets', label: 'Déchets & propreté', emoji: '🗑️' },
  { id: 'mobilier', label: 'Mobilier urbain', emoji: '🪑' },
  { id: 'espaces-verts', label: 'Espaces verts', emoji: '🌳' },
  { id: 'voie-velo', label: 'Voie vélo', emoji: '🚲' },
  { id: 'signalisation', label: 'Signalisation', emoji: '🚧' },
  { id: 'autre', label: 'Autre', emoji: '✨' },
];

const loginView = document.getElementById('login-view');
const panelView = document.getElementById('panel-view');
const loginForm = document.getElementById('login-form');
const loginError = document.getElementById('login-error');
const reportsList = document.getElementById('reports-list');

function showPanel() {
  loginView.hidden = true;
  panelView.hidden = false;
  loadReports();
}

function showLogin() {
  panelView.hidden = true;
  loginView.hidden = false;
}

async function checkSession() {
  try {
    const res = await fetch('/api/admin/check', { credentials: 'include' });
    if (res.ok) showPanel(); else showLogin();
  } catch {
    showLogin();
  }
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.textContent = '';
  const user = document.getElementById('login-user').value;
  const password = document.getElementById('login-pass').value;
  const submitBtn = loginForm.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, password }),
    });
    const data = await res.json().catch(() => ({}));
    if (res.ok) {
      loginForm.reset();
      showPanel();
    } else {
      loginError.textContent = data.error || 'Connexion impossible.';
    }
  } catch {
    loginError.textContent = 'Erreur réseau. Réessayez.';
  } finally {
    submitBtn.disabled = false;
  }
});

document.getElementById('admin-logout').addEventListener('click', async () => {
  await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
  showLogin();
});

document.getElementById('admin-refresh').addEventListener('click', loadReports);

function categoryOptions(selected) {
  return CATEGORIES.map(c => `<option value="${c.id}" ${c.id === selected ? 'selected' : ''}>${c.emoji} ${c.label}</option>`).join('');
}

function formatDate(iso) {
  try {
    return new Date(iso).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch {
    return iso;
  }
}

async function loadReports() {
  reportsList.innerHTML = '<p class="admin-empty">Chargement…</p>';
  let reports;
  try {
    const res = await fetch('/api/reports', { credentials: 'include' });
    reports = await res.json();
  } catch {
    reportsList.innerHTML = '<p class="admin-empty">Impossible de charger les signalements.</p>';
    return;
  }

  if (!Array.isArray(reports) || reports.length === 0) {
    reportsList.innerHTML = '<p class="admin-empty">Aucun signalement pour l’instant.</p>';
    return;
  }

  reportsList.innerHTML = reports.map(r => `
    <div class="report-row" data-id="${r.id}">
      ${r.photo ? `<img src="${r.photo}" alt="">` : ''}
      <div class="report-fields">
        <select class="f-category">${categoryOptions(r.category)}</select>
        <textarea class="f-comment" maxlength="140" rows="2">${r.comment ? escapeHtml(r.comment) : ''}</textarea>
        <select class="f-status">
          <option value="ouvert" ${r.status !== 'resolu' ? 'selected' : ''}>Ouvert</option>
          <option value="resolu" ${r.status === 'resolu' ? 'selected' : ''}>Résolu</option>
        </select>
        <div class="report-meta">Signalé le ${formatDate(r.createdAt)} · ${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}</div>
      </div>
      <div class="report-actions">
        <button class="btn btn-primary btn-sm f-save">Enregistrer</button>
        <button class="btn btn-ghost btn-sm f-delete">Supprimer</button>
      </div>
    </div>
  `).join('');

  reportsList.querySelectorAll('.report-row').forEach(row => {
    const id = row.dataset.id;
    row.querySelector('.f-save').addEventListener('click', () => saveReport(id, row));
    row.querySelector('.f-delete').addEventListener('click', () => deleteReport(id, row));
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function saveReport(id, row) {
  const btn = row.querySelector('.f-save');
  btn.disabled = true;
  btn.textContent = 'Enregistrement…';
  const payload = {
    category: row.querySelector('.f-category').value,
    comment: row.querySelector('.f-comment').value,
    status: row.querySelector('.f-status').value,
  };
  try {
    const res = await fetch(`/api/admin/reports/${encodeURIComponent(id)}`, {
      method: 'PATCH',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.status === 401) { showLogin(); return; }
    btn.textContent = res.ok ? 'Enregistré ✓' : 'Erreur';
  } catch {
    btn.textContent = 'Erreur réseau';
  } finally {
    btn.disabled = false;
    setTimeout(() => { btn.textContent = 'Enregistrer'; }, 1800);
  }
}

async function deleteReport(id, row) {
  if (!confirm('Supprimer définitivement ce signalement ?')) return;
  try {
    const res = await fetch(`/api/admin/reports/${encodeURIComponent(id)}`, {
      method: 'DELETE',
      credentials: 'include',
    });
    if (res.status === 401) { showLogin(); return; }
    if (res.ok) {
      row.remove();
      if (!reportsList.querySelector('.report-row')) {
        reportsList.innerHTML = '<p class="admin-empty">Aucun signalement pour l’instant.</p>';
      }
    }
  } catch {
    alert('Erreur réseau, réessayez.');
  }
}

checkSession();
</script>
</body>
</html>
